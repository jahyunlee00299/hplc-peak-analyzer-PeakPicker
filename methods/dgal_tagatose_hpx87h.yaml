method_id: dgal_tagatose_hpx87h_v1
column: HPX-87H
mobile_phase: 5mM H2SO4
flow_rate_mLmin: 0.5
temperature_C: 65
detector: RID
signal_file: RID1A.ch

compounds:
  # RT 추정 근거: HPX-87H (Bio-Rad Aminex) 5mM H2SO4 0.5 mL/min 65°C 조건
  # D-Galactose + D-Tagatose: HPX-87H에서 공용 피크 (~11.0 min) — 두 물질 분리 불가
  #   → "D-Gal+Tag" 합산 정량 후 GO oxidase assay로 Tagatose 별도 측정
  # Galactitol (Galol): 갈락티톨 부산물
  # Formate: 보조인자 프록시 (~14.8 min)
  #
  # 검량선 출처: Kinetic-modeling-and-optimization 분석 스크립트
  #   - D-Gal+Tag, Galactitol: fit_endo_formate_gal_cascade.py (260302 실험 기준)
  #     경로: KineticModeling/global_parameter_optimization/archive/parameter_estimation/
  #   - D-Tagatose (GO 전용): 260226_ipa_freeze_gp_analysis.py
  #     경로: archive/tagatose_wholecell/analysis/
  #   - D-Galactose (단독): hpx87h_sugars.yaml Fructose-계 측정값 (2408 지원)
  #
  # 단위 변환: conc(mM) = slope * area(nRIU·s) + intercept
  #   (소스 형식: Area = a*C + y0  =>  slope=1/a, intercept=-y0/a)
  #
  # ⚠️ 주의: D-Gal+Tag는 합산 피크 — Tagatose 별도 정량에는 GO oxidase assay 필요
  # ⚠️ 주의: D-Galactose 단독 검량선은 간접 추정값 (직접 표준곡선 권장)

  D-Gal_and_Tag:
    rt_expected: 11.0
    rt_window: [10.5, 11.5]
    calibration:
      slope: 1.641481e-05   # a=60920.6138, y0=2822.0417 (260302 실험)
      intercept: -0.046323
      r2: null
      source: "fit_endo_formate_gal_cascade.py (260302 WCB experiment)"
    note: "D-Galactose + D-Tagatose 합산 피크; 분리 불가"
    color: "#e74c3c"

  Galactitol:
    rt_expected: 12.2
    rt_window: [11.8, 12.8]
    calibration:
      slope: 1.831848e-05   # a=54589.6686, y0=1576.3542 (260302 실험)
      intercept: -0.028876
      r2: null
      source: "fit_endo_formate_gal_cascade.py (260302 WCB experiment)"
    color: "#9b59b6"

  D-Tagatose:
    rt_expected: 11.0
    rt_window: [10.5, 11.5]
    calibration:
      slope: 1.550417e-05   # a=64498.7576, y0=1220.2542 (GO oxidase assay 전용)
      intercept: -0.018919
      r2: null
      source: "260226_ipa_freeze_gp_analysis.py (GO oxidase assay calibration)"
    note: "GO oxidase assay 조건에서만 사용 (D-Gal+Tag 합산 피크와 RT 동일)"
    color: "#e67e22"

  D-Galactose:
    rt_expected: 11.0
    rt_window: [10.5, 11.5]
    calibration:
      slope: 1.563641e-05   # a=63953.3143, y0=574.9139 (hpx87h_sugars, 2408 지원)
      intercept: -0.008990
      r2: null
      source: "hpx87h_sugars.yaml D-Fructose 계열 (2408 by 지원); direct calibration recommended"
    note: "간접 추정값 — D-Gal 단독 직접 표준곡선 측정 권장"
    color: "#3498db"

  Formate:
    rt_expected: 14.8
    rt_window: [14.4, 15.3]
    calibration:
      slope: 1.837991e-04   # a=5440.7244, y0=10.4596 (Asana task 1206295769083211)
      intercept: -0.001922
      r2: null
      source: "Asana task 1206295769083211 (2024-01-10)"
    color: "#1abc9c"

baseline:
  method: valley_dropline
  smoothing: savgol
  smoothing_window: 11
  smoothing_poly: 3

peak_detection:
  min_prominence_factor: 3.0
  min_height_fraction: 0.01
  distance_pts: 10

qc:
  ne_control_keyword: "_NC_"
  max_product_area_ne: 5000
  min_r2_calibration: 0.99
